<form
  [formGroup]="createForm"
  (ngSubmit)="onSave()"
  class="h-full flex flex-col bg-white border-l border-slate-200"
>
  <!-- Header -->
  <div
    class="px-6 py-3 border-b border-slate-100 flex items-center min-h-[56px]"
  >
    <button
      type="button"
      (click)="onClose()"
      class="text-slate-400 hover:text-slate-600 transition-colors"
    >
      <i class="pi pi-angle-double-right text-xl font-light"></i>
    </button>
  </div>

  <div class="px-6 py-6 flex-1 overflow-y-auto">
    <!-- Title Section -->
    <div class="mb-6">
      <span
        class="text-xs font-medium text-slate-400 uppercase tracking-wide"
        >{{ mockData.id }}</span
      >
      <h2 class="text-xl font-bold text-[#172b4d] mt-1 leading-tight">
        {{ mockData.title }}
      </h2>
    </div>

    <!-- Description Section -->
    <div class="mb-4">
      <h3 class="text-xl font-bold text-[#172b4d] mb-2 leading-tight">
        Description
      </h3>
      <input
        type="text"
        formControlName="description"
        placeholder="Enter description"
        class="w-full text-sm text-slate-500 placeholder-slate-300 border-none p-0 focus:ring-0 resize-none min-h-[30px] leading-relaxed"
      />
    </div>

    <hr class="border-slate-100 mb-4" />

    <!-- Appointment Details -->
    <div class="mb-6">
      <h3 class="text-sm font-bold text-[#172b4d] mb-4">Appointment details</h3>

      <div class="space-y-4">
        <!-- Lead -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/user.svg"
              [svgStyle]="{ 'width.px': 20, 'height.px': 20, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Lead</span>
          <div class="flex items-center gap-2">
            <img
              [src]="mockData.lead.avatar"
              alt="Avatar"
              class="w-6 h-6 rounded-full object-cover"
            />
            <span class="text-[15px] text-[#172b4d] font-semibold">{{
              mockData.lead.name
            }}</span>
          </div>
        </div>

        <!-- Start -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/wl_calendar_alt.svg"
              [svgStyle]="{ 'width.px': 18, 'height.px': 18, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Start</span>
          <div class="flex-1">
            <p-calendar
              formControlName="start"
              [showTime]="true"
              [hourFormat]="'24'"
              dateFormat="dd/mm/yy"
              appendTo="body"
              styleClass="border-none p-0 w-full"
              inputStyleClass="border-none p-0 bg-transparent text-[15px] font-semibold text-[#172b4d] shadow-none w-full"
            ></p-calendar>
          </div>
        </div>

        <!-- End -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/wl_calendar_alt.svg"
              [svgStyle]="{ 'width.px': 18, 'height.px': 18, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">End</span>
          <div class="flex-1">
            <p-calendar
              formControlName="end"
              [showTime]="true"
              [hourFormat]="'24'"
              dateFormat="dd/mm/yy"
              appendTo="body"
              styleClass="border-none p-0 w-full"
              inputStyleClass="border-none p-0 bg-transparent text-[15px] font-semibold text-[#172b4d] shadow-none w-full"
            ></p-calendar>
          </div>
        </div>

        <!-- Visibility -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <i class="pi pi-eye text-[#758195] text-lg"></i>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Visibility</span>
          <div class="flex-1">
            <p-dropdown
              formControlName="visibility"
              [options]="visibilityOptions"
              class="custom-dropdown"
              [dropdownIcon]="''"
              styleClass="border-none p-0 bg-transparent text-[15px] font-semibold text-[#172b4d] shadow-none"
            ></p-dropdown>
          </div>
        </div>

        <!-- Color -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/wl_palette.svg"
              [svgStyle]="{ 'width.px': 18, 'height.px': 18, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Color</span>
          <div class="flex items-center relative">
            <button
              type="button"
              (click)="toggleColorPicker()"
              class="w-4 h-4 rounded-full border border-white shadow-sm ring-2 ring-slate-100 ring-offset-1 transition-transform hover:scale-110"
              [style.backgroundColor]="createForm.get('color')?.value"
            ></button>

            <!-- Color Selection Popover -->
            <div
              *ngIf="isColorPickerOpen"
              class="absolute left-7 top-1/2 -translate-y-1/2 flex items-center gap-2 bg-white p-2 rounded-full shadow-lg border border-slate-100 z-20"
            >
              <button
                *ngFor="let color of colorOptions"
                type="button"
                (click)="selectColor(color)"
                class="w-4 h-4 rounded-full transition-transform hover:scale-125 border border-white shadow-sm"
                [style.backgroundColor]="color"
                [class.ring-2]="createForm.get('color')?.value === color"
                [class.ring-slate-200]="
                  createForm.get('color')?.value === color
                "
              ></button>
            </div>
          </div>
        </div>

        <!-- Created Date -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/wl_calendar_alt.svg"
              [svgStyle]="{ 'width.px': 18, 'height.px': 18, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Created date</span>
          <span class="text-[15px] text-[#172b4d] font-semibold">{{
            mockData.createdDate
          }}</span>
        </div>

        <!-- Created By -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <svg-icon
              src="assets/icons/schedule_calendar/user.svg"
              [svgStyle]="{ 'width.px': 20, 'height.px': 20, fill: '#758195' }"
            ></svg-icon>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Created by</span>
          <span class="text-[15px] text-[#172b4d] font-semibold">{{
            mockData.createdBy
          }}</span>
        </div>

        <!-- Reminder -->
        <div class="flex items-center">
          <div class="w-10 flex items-center">
            <i class="pi pi-bell text-[#758195] text-lg"></i>
          </div>
          <span class="w-28 text-[15px] text-[#758195]">Reminder</span>
          <div class="flex-1">
            <p-dropdown
              formControlName="reminder"
              [options]="reminderOptions"
              class="custom-dropdown"
              [dropdownIcon]="''"
              styleClass="border-none p-0 bg-transparent text-[15px] font-semibold text-[#172b4d] shadow-none w-full"
            ></p-dropdown>
          </div>
        </div>
      </div>
    </div>

    <hr class="border-slate-100 mb-6" />

    <!-- Comment Section -->
    <div class="mb-6">
      <h3 class="text-sm font-bold text-[#172b4d] mb-4">Comment</h3>

      <div class="bg-[#f8fafc] rounded-md p-2 border border-slate-200">
        <div class="mb-1 pl-6">
          <span class="text-sm font-bold text-[#172b4d]">{{
            mockData.commentUser
          }}</span>
        </div>
        <div class="pl-2">
          <input
            type="text"
            formControlName="comment"
            placeholder="Enter comment here"
            class="w-full bg-transparent border-none p-0 text-sm text-slate-500 placeholder-slate-300 focus:ring-0 resize-none min-h-[40px] leading-relaxed"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div
    class="px-6 py-4 border-t border-slate-100 bg-white flex justify-end gap-3"
  >
    <button
      type="button"
      (click)="onClose()"
      class="px-4 h-9 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-md transition-colors"
    >
      Cancel
    </button>
    <button
      type="submit"
      class="px-6 h-9 text-sm font-medium text-white bg-brand-primary hover:bg-green-600 rounded-md shadow-sm transition-colors"
    >
      Save
    </button>
  </div>
</form>
