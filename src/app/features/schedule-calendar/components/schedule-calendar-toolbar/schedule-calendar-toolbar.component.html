<div class="">
  <div class="flex justify-between">
    <div class="w-[330px]">
      <form [formGroup]="toolbarForm">
        <app-form-control>
          <div
            class="flex items-center px-3 h-9 rounded-md border border-gray-300 bg-white shadow-sm"
          >
            <i class="pi pi-search text-gray-400 mr-2"></i>

            <input
              formControlName="search"
              type="text"
              placeholder="Search by name, ID, or phone number"
              class="w-full outline-none text-sm placeholder-gray-400"
            />
          </div>
        </app-form-control>
      </form>
    </div>
    <div class="flex items-center gap-2">
      <!-- Filters -->

      <button
        type="button"
        class="inline-flex h-9 items-center gap-2 rounded-md border border-slate-300 bg-white px-3 text-[15px] font-medium text-slate-700 shadow-sm hover:bg-slate-50"
      >
        <svg-icon
          src="assets/icons/schedule_calendar/filters.svg"
          [svgStyle]="{ width: '18px', height: '18px' }"
        ></svg-icon>
        <span>Filters</span>
      </button>

      <!-- List / Calendar group -->
      <div
        class="inline-flex h-9 overflow-hidden rounded-md border border-slate-300 bg-white shadow-sm"
      >
        <button
          type="button"
          (click)="selectedView = 'list'"
          [ngClass]="
            selectedView === 'list'
              ? 'bg-[#ebedef] text-[#172b4d]'
              : 'bg-white text-[#172b4d] hover:bg-slate-50'
          "
          class="inline-flex items-center gap-2 border-r border-slate-300 px-4 text-[15px] font-medium transition-colors"
        >
          <i class="pi pi-list text-[18px]"></i>
          <span>List</span>
        </button>

        <button
          type="button"
          (click)="selectedView = 'calendar'"
          [ngClass]="
            selectedView === 'calendar'
              ? 'bg-[#ebedef] text-[#172b4d]'
              : 'bg-white text-[#172b4d] hover:bg-slate-50'
          "
          class="inline-flex items-center gap-2 px-4 text-[15px] font-medium transition-colors"
        >
          <i class="pi pi-calendar text-[18px]"></i>
          <span>Calendar</span>
        </button>
      </div>

      <!-- Column view -->
      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 bg-white text-slate-700 shadow-sm hover:bg-slate-50"
      >
        <svg-icon
          src="assets/icons/schedule_calendar/column_view.svg"
          [svgStyle]="{ width: '14px', height: '14px' }"
        ></svg-icon>
      </button>

      <!-- Import -->
      <button
        type="button"
        class="inline-flex h-9 items-center rounded-md border border-slate-300 bg-white px-3 text-[15px] font-medium text-slate-700 shadow-sm hover:bg-slate-50"
      >
        Import
      </button>

      <!-- Create -->
      <button
        type="button"
        class="inline-flex h-9 items-center gap-2 rounded-md bg-brand-primary px-3 text-[15px] font-medium text-white shadow-sm transition-all duration-200 hover:bg-green-600"
      >
        <i class="pi pi-plus-circle text-sm"></i>
        <span>Create</span>
      </button>
    </div>
  </div>
</div>
