<div id="schedule-calendar" class="relative px-6 py-4 flex flex-col h-full bg-white overflow-hidden">
  <!-- Header Title -->
  <div class="mb-4">
    <h1 class="text-xl font-semibold text-slate-800">Lead management</h1>
  </div>

  <!-- Toolbar -->
  <app-schedule-calendar-toolbar (create)="toggleCreateSidebar()"></app-schedule-calendar-toolbar>

  <!-- Content Container -->
  <div class="flex-1 min-h-0 bg-white">
    <app-schedule-calendar-container></app-schedule-calendar-container>
  </div>

  <!-- Create Sidebar -->
  <div
    class="fixed inset-y-0 right-0 w-[360px] z-50 transform transition-transform duration-300 ease-in-out shadow-2xl"
    [class.translate-x-full]="!isCreateSidebarOpen"
    [class.translate-x-0]="isCreateSidebarOpen"
  >
    <app-schedule-calendar-create (close)="toggleCreateSidebar()"></app-schedule-calendar-create>
  </div>

  <!-- Overlay -->
  <div
    *ngIf="isCreateSidebarOpen"
    (click)="toggleCreateSidebar()"
    class="fixed inset-0 bg-black/20 z-40 transition-opacity duration-300"
  ></div>
</div>
