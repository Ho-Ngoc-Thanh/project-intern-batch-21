<div class="rounded-[28px] px-3 mr-2">
    <div class="mb-5 flex items-start justify-between">
        <div>
            <p class="mb-1 text- font-medium text-[#c7b8bb]">
                Ready to close more deals?
            </p>
            <h2 class="text-2xl font-bold tracking-tight text-[#1f2937]">
                Welcome Back, {{ dashboardData?.user?.name }} 👋
            </h2>
        </div>

        <button
            class="rounded-xl bg-brand-primary px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-600">
            + New Property
        </button>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
        <div *ngFor="let item of dashboardData?.stats" class="min-h-[170px] rounded-2xl bg-white px-6 py-5 shadow-sm">
            <div class="mb-5 flex items-start justify-between ">
                <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-slate-50">

                    <!-- Type: class -->
                    <i *ngIf="item.type === 'class'" [ngClass]="[item.icon, item.color]" class="pi text-lg "></i>

                    <!-- Type: svg -->
                    <svg-icon *ngIf="item.type === 'svg'" [src]="item.icon" [ngClass]="item.color"
                        [svgStyle]="{ 'width.px': 18, 'height.px': 18 }"></svg-icon>
                </div>

                <span class="text-sm font-semibold text-emerald-400">
                    +{{ item.growth }}%
                </span>
            </div>

            <div class="flex h-[78px] flex-col justify-between">
                <p class="text-[14px] font-medium leading-6 text-[#767A84]">
                    {{ item.label }}
                </p>

                <h3 class="text-[1.8rem] font-bold text-[#1f2937] text-[#1f2937]">
                    {{ item.displayValue ? item.displayValue : item.value }}
                </h3>
            </div>
        </div>
    </div>
</div>
