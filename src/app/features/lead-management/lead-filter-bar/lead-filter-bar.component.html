<div class="flex flex-wrap items-center gap-2 rounded-2xl bg-white p-4 pl-1 shadow-sm">
 
    <!-- All (active) -->
    <button class="inline-flex h-8 items-center gap-2 rounded-full bg-green-600 px-3 text-[13px] text-white">
        <span>All</span>
        <span
            class="flex items-center justify-center rounded-full bg-white px-1.5 py-0.5 text-[11px] font-bold text-green-600">
            1007
        </span>
    </button>

    <i class="pi pi-chevron-left mx-1 text-xs text-gray-400"></i>

    <!-- Cellphone -->
    <button
        class="inline-flex h-8 items-center gap-2 rounded-full border border-green-600 bg-white px-3 text-[13px] text-green-600">
        <span>Cellphone</span>
        <span
            class="flex items-center justify-center rounded-full bg-green-100 px-1.5 py-0.5 text-[11px] font-bold text-green-600">
            417
        </span>
    </button>

    <!-- Interest -->
    <button
        class="inline-flex h-8 items-center gap-2 rounded-full border border-purple-400 bg-white px-3 text-[13px] text-purple-600">
        <span>Interest</span>
        <span
            class="flex items-center justify-center rounded-full bg-purple-100 px-1.5 py-0.5 text-[11px] font-bold text-purple-600">
            329
        </span>
    </button>

    <!-- Follow now -->
    <button
        class="inline-flex h-8 items-center gap-2 rounded-full border border-orange-400 bg-white px-3 text-[13px] text-orange-600">
        <span>Follow now</span>
        <span
            class="flex items-center justify-center rounded-full bg-orange-100 px-1.5 py-0.5 text-[11px] font-bold text-orange-600">
            36
        </span>
    </button>

    <!-- Follow later -->
    <button
        class="inline-flex h-8 items-center gap-2 rounded-full border border-green-500 bg-white px-3 text-[13px] text-green-600">
        <span>Follow later</span>
        <span
            class="flex items-center justify-center rounded-full bg-green-100 px-1.5 py-0.5 text-[11px] font-bold text-green-600">
            121
        </span>
    </button>

    <!-- Stop -->
    <button
        class="inline-flex h-8 items-center gap-2 rounded-full border border-red-500 bg-white px-3 text-[13px] text-red-600">
        <span>Stop</span>
        <span
            class="flex items-center justify-center rounded-full bg-red-100 px-1.5 py-0.5 text-[11px] font-bold text-red-600">
            11
        </span>
    </button>

    <i class="pi pi-chevron-right mx-1 text-xs text-gray-400"></i>

    <!-- Cụm Dropdowns -->
    <button
        class="flex h-8 items-center gap-2 rounded-lg border border-gray-200 px-3 text-[13px] font-semibold text-gray-700 hover:bg-gray-50">
        <span>Birthday</span>
        <i class="pi pi-chevron-down text-[10px] text-gray-400"></i>
    </button>

    <button
        class="flex h-8 items-center gap-2 rounded-lg border border-gray-200 px-3 text-[13px] font-semibold text-gray-700 hover:bg-gray-50">
        <span>Last update</span>
        <i class="pi pi-chevron-down text-[10px] text-gray-400"></i>
    </button>

    <button
        class="flex h-8 items-center gap-2 rounded-lg border border-gray-200 px-3 text-[13px] font-semibold text-gray-700 hover:bg-gray-50">
        <span>No update</span>
        <i class="pi pi-chevron-down text-[10px] text-gray-400"></i>
    </button>

    <button class="px-2 text-[13px] text-gray-400 hover:text-gray-600">Reset</button>
</div>
