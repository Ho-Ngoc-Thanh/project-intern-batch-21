<div class="bg-white w-full m-7 px-8 py-10 rounded-[24px] shadow-lg">
  <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()">
    <div>
      <h2
        class="text-4xl font-black font-roboto text-gray-950 text-center leading-normal"
      >
        CRM Home
      </h2>
    </div>
    <div class="py-3">
      <div
        class="flex items-center border-b-2 border-gray-300 placeholder-gray-500 mt-8 pb-3"
      >
        <!-- <label for="">Username</label> -->
        <input
          class="w-full outline-none"
          type="text"
          formControlName="username"
          placeholder="Username"
        />
        <i class="pi pi-user"></i>
      </div>
      <div
        class="flex items-center border-b-2 border-gray-300 placeholder-gray-500 mt-10 mb-4 pb-3"
      >
        <!-- <label for="">Pass</label> -->
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Pass"
          class="w-full outline-none"
        />
        <i
          class="pi cursor-pointer"
          [ngClass]="showPassword ? 'pi-eye' : 'pi-eye-slash'"
          (click)="togglePassword()"
        ></i>
      </div>
    </div>
    <div class="flex justify-center content-center my-5 mb-2">
      <button
        type="submit"
        class="w-full h-13 text-white rounded-5xl bg-brand-primary hover:bg-green-500"
      >
        ENTRAR
      </button>
    </div>
  </form>
</div>
